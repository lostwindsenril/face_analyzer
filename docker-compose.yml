version: '3.8'

services:
  face-analyzer:
    build:
      context: ..
      dockerfile: face_analyzer/Dockerfile
    image: face-analyzer:latest
    container_name: face-analyzer-app
    restart: unless-stopped
    
    # GPU support configuration
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # Port mapping
    ports:
      - "5000:5000"
    
    # Environment variables
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - CUDA_VISIBLE_DEVICES=all
      - PYTHONPATH=/app
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - LOG_LEVEL=INFO
      - MAX_CONCURRENT_REQUESTS=5
      - MODEL_CACHE_SIZE=1000
      - ENABLE_GPU=true
    
    # Volume mounts
    volumes:
      # Persist model files
      - ./models:/app/models
      # Cache directory
      - ./cache:/app/cache
      # Log directory
      - ./logs:/app/logs
      # Temp directory
      - ./temp:/app/temp
      # Configuration files
      - ./config:/app/config
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Resource limits
    mem_limit: 8g
    mem_reservation: 4g
    cpus: '4.0'
    
    # Network configuration
    networks:
      - face-analyzer-network
    
    # Dependency services
    # depends_on:
    #   - redis
    
    # Security configuration
    security_opt:
      - no-new-privileges:true
    
    # User configuration (optional, improves security)
    # user: "1000:1000"

  # Redis cache service (optional)
  # redis:
  #   image: redis:7-alpine
  #   container_name: face-analyzer-redis
  #   restart: unless-stopped
  #
  #   ports:
  #     - "6379:6379"
  #
  #   volumes:
  #     - redis-data:/data
  #     - ./redis.conf:/usr/local/etc/redis/redis.conf
  #
  #   command: redis-server /usr/local/etc/redis/redis.conf
  #
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #
  #   networks:
  #     - face-analyzer-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: face-analyzer-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    
    depends_on:
      - face-analyzer
    
    networks:
      - face-analyzer-network

  # Monitoring service (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: face-analyzer-prometheus
    restart: unless-stopped
    
    ports:
      - "9090:9090"
    
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    
    networks:
      - face-analyzer-network

  # Grafana dashboard (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: face-analyzer-grafana
    restart: unless-stopped
    
    ports:
      - "3000:3000"
    
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    
    networks:
      - face-analyzer-network

# Network configuration
networks:
  face-analyzer-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volume configuration
volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
